<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — BreakOut X</title>
  <meta name="description" content="Login to BreakOut X" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-section {
      position: relative;
      z-index: 1;
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-wrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 3rem;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-card), var(--shadow-neon);
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .login-title {
      font-family: var(--font-game);
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--accent-cyan);
      margin-bottom: 0.5rem;
      text-shadow: 0 0 15px rgba(0,245,255,0.5);
    }
    .login-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      letter-spacing: 1px;
    }
    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .form-label {
      display: block;
      font-family: var(--font-game);
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 0.8rem;
    }
    .form-input {
      width: 100%;
      background: rgba(3,7,18,0.5);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1rem;
      transition: var(--transition);
      outline: none;
    }
    .form-input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(0,245,255,0.2);
      background: rgba(3,7,18,0.8);
    }
    .login-btn {
      position: relative;
      width: 100%;
      margin-top: 1rem;
      padding: 16px 0;
      background: transparent;
      border: 2px solid var(--accent-cyan);
      border-radius: 99px;
      font-family: var(--font-game);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--accent-cyan);
      cursor: pointer;
      transition: var(--transition);
      overflow: hidden;
      text-shadow: 0 0 10px var(--accent-cyan);
      box-shadow: 0 0 20px rgba(0,245,255,0.1), inset 0 0 10px rgba(0,245,255,0.05);
    }
    .login-btn:hover {
      background: var(--accent-cyan);
      color: var(--bg-deep);
      text-shadow: none;
      box-shadow: 0 0 40px rgba(0,245,255,0.4);
      transform: translateY(-2px);
    }
    .error-msg {
      color: var(--accent-pink);
      font-size: 0.8rem;
      font-family: var(--font-game);
      letter-spacing: 1px;
      margin-top: 1.5rem;
      display: none;
      text-shadow: 0 0 10px rgba(255,20,147,0.5);
      padding: 10px;
      background: rgba(255,20,147,0.1);
      border: 1px solid rgba(255,20,147,0.3);
      border-radius: var(--radius-sm);
    }
  </style>
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="particles" id="particles"></div>

  <!-- Header -->
  <header class="site-header">
    <a href="index.html" class="logo" style="text-decoration: none;">
      <span class="logo-icon">BX</span>
      <span class="logo-text">BREAK<span class="accent">OUT</span> X</span>
    </a>
    <!-- Navigation hidden on login page -->
    <div class="header-badge">
      <span class="badge-dot"></span>
      <span>LIVE</span>
    </div>
  </header>

  <section class="login-section">
    <div class="login-wrapper">
      <div class="login-card">
        <h2 class="login-title">SYSTEM LOGIN</h2>
        <p class="login-sub">AUTHORIZED PERSONNEL ONLY</p>
        
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="username">USERNAME</label>
            <input type="text" id="username" class="form-input" placeholder="Enter identification" required autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label" for="password">PASSWORD</label>
            <input type="password" id="password" class="form-input" placeholder="Enter security key" required autocomplete="off" />
          </div>
          <button type="submit" class="login-btn">INITIALIZE ACCESS</button>
          <div id="errorMsg" class="error-msg">ACCESS DENIED: INVALID CREDENTIALS</div>
        </form>
      </div>
    </div>
  </section>

  <script>
    // Mock particles for background
    const pContainer = document.getElementById('particles');
    for(let i=0; i<30; i++) {
      let p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (Math.random() * 3 + 2) + 's';
      p.style.animationDelay = Math.random() * 2 + 's';
      pContainer.appendChild(p);
    }

    // Login Logic
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      
      // Default credentials based on Java system
      if (user === 'Krupa' && pass === 'Krupa@144') {
        errorMsg.style.display = 'none';
        
        // Simple success animation
        const btn = document.querySelector('.login-btn');
        btn.style.background = 'var(--accent-green)';
        btn.style.color = '#000';
        btn.style.borderColor = 'var(--accent-green)';
        btn.style.boxShadow = '0 0 30px rgba(57,255,20,0.5)';
        btn.textContent = 'ACCESS GRANTED';
        
        sessionStorage.setItem('bx_auth', 'true');
        
        setTimeout(() => {
          window.location.href = 'game.html';
        }, 1000);
      } else {
        errorMsg.style.display = 'block';
        
        // Shake animation for error
        const card = document.querySelector('.login-card');
        card.animate([
          { transform: 'translateX(0)' },
          { transform: 'translateX(-10px)' },
          { transform: 'translateX(10px)' },
          { transform: 'translateX(-10px)' },
          { transform: 'translateX(10px)' },
          { transform: 'translateX(0)' }
        ], { duration: 400, easing: 'ease-in-out' });
      }
    });
  </script>
</body>
</html>
